<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 指挥官学习路线图 - 教育版</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Serif+SC:wght@700;900&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f8fafc;
  --surface: #ffffff;
  --border: #e2e8f0;
  --primary: #2563eb;
  --primary-light: #dbeafe;
  --secondary: #64748b;
  --accent-success: #10b981;
  --accent-warning: #f59e0b;
  --text-main: #1e293b;
  --text-muted: #64748b;
  --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-serif: 'Noto Serif SC', serif;
  --font-mono: 'JetBrains Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { 
  background: var(--bg); 
  color: var(--text-main); 
  font-family: var(--font-sans); 
  line-height: 1.6;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: white;
  padding: 80px 32px 60px;
  text-align: center;
  border-bottom: 1px solid var(--border);
  position: relative;
}
.header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--primary), #60a5fa);
}
.header-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--primary-light);
  color: var(--primary);
  font-weight: 700;
  font-size: 12px;
  padding: 6px 16px;
  border-radius: 99px;
  margin-bottom: 24px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.header h1 {
  font-family: var(--font-serif);
  font-size: clamp(32px, 6vw, 56px);
  font-weight: 900;
  color: #0f172a;
  margin-bottom: 16px;
  line-height: 1.2;
}
.header .sub {
  font-size: 18px;
  color: var(--secondary);
  max-width: 600px;
  margin: 0 auto 24px;
}
.project-pill {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: #fffbeb;
  border: 1px solid #fef3c7;
  color: #92400e;
  padding: 10px 20px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 14px;
}

/* ── PROGRESS ── */
.progress-section {
  max-width: 500px;
  margin: 40px auto 0;
}
.progress-meta {
  display: flex;
  justify-content: space-between;
  font-weight: 700;
  font-size: 14px;
  color: var(--primary);
  margin-bottom: 10px;
}
.progress-track {
  height: 10px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--primary);
  transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* ── TABS ── */
.tabs-container {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
}
.tabs {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 0 20px;
}
.tab-btn {
  padding: 20px 24px;
  background: transparent;
  border: none;
  border-bottom: 3px solid transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-weight: 700;
  font-size: 14px;
  transition: all 0.2s;
}
.tab-btn:hover {
  color: var(--primary);
}
.tab-btn.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}

/* ── CONTENT ── */
.content {
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 20px 100px;
}

.phase-intro {
  margin-bottom: 48px;
  text-align: center;
}
.phase-eyebrow {
  color: var(--primary);
  font-weight: 800;
  font-size: 14px;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 12px;
}
.phase-title {
  font-family: var(--font-serif);
  font-size: 36px;
  font-weight: 900;
  margin-bottom: 16px;
}
.phase-desc {
  font-size: 16px;
  color: var(--text-muted);
  max-width: 600px;
  margin: 0 auto;
}

/* ── LEARNING MINDSET ── */
.mindset-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 40px;
  display: flex;
  gap: 20px;
  align-items: flex-start;
  box-shadow: var(--shadow);
}
.mindset-icon {
  font-size: 32px;
  background: #fef3c7;
  padding: 12px;
  border-radius: 12px;
}
.mindset-text {
  font-size: 15px;
  color: #475569;
}
.mindset-text strong {
  color: #1e293b;
  display: block;
  margin-bottom: 4px;
  font-size: 16px;
}

/* ── COURSE STEPS ── */
.steps {
  display: grid;
  gap: 20px;
}
.step-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 16px;
  transition: all 0.3s ease;
  overflow: hidden;
}
.step-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}
.step-card.done {
  border-color: var(--accent-success);
  background: #f0fdf4;
}

.step-header {
  padding: 24px;
  display: flex;
  align-items: center;
  gap: 20px;
  cursor: pointer;
}
.step-number {
  width: 36px;
  height: 36px;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 14px;
  color: var(--secondary);
  flex-shrink: 0;
}
.done .step-number {
  background: var(--accent-success);
  border-color: var(--accent-success);
  color: white;
}

.step-info {
  flex: 1;
}
.step-tag {
  font-size: 11px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--primary);
  margin-bottom: 4px;
}
.step-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-main);
}
.done .step-title {
  color: var(--text-muted);
  text-decoration: line-through;
}

.step-body {
  padding: 0 24px 24px 80px;
  display: none;
}
.step-body.open {
  display: block;
}

.step-desc {
  color: var(--text-muted);
  margin-bottom: 20px;
  font-size: 15px;
}

/* ── ASSIGNMENT BOX ── */
.assignment {
  background: #f8fafc;
  border-left: 4px solid var(--primary);
  padding: 20px;
  border-radius: 0 12px 12px 0;
  margin-bottom: 20px;
}
.assignment-label {
  font-weight: 800;
  font-size: 12px;
  color: var(--primary);
  text-transform: uppercase;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.assignment-text {
  font-family: var(--font-mono);
  font-size: 13px;
  color: #334155;
  white-space: pre-wrap;
  background: white;
  padding: 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
}

/* ── RESOURCES ── */
.resources {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.resource-link {
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  background: var(--primary-light);
  padding: 6px 14px;
  border-radius: 8px;
  transition: all 0.2s;
}
.resource-link:hover {
  background: var(--primary);
  color: white;
}

/* ── NAV ── */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  margin-top: 60px;
}
.btn {
  padding: 14px 28px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid var(--border);
  background: white;
  color: var(--text-main);
}
.btn:hover:not(:disabled) {
  border-color: var(--primary);
  color: var(--primary);
}
.btn.primary {
  background: var(--primary);
  color: white;
  border: none;
}
.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ── TEACHER TIPS ── */
.teacher-tips {
  margin-top: 80px;
  background: #f1f5f9;
  border-radius: 20px;
  padding: 32px;
}
.tips-title {
  font-family: var(--font-serif);
  font-size: 24px;
  font-weight: 900;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.tip-list {
  list-style: none;
}
.tip-item {
  position: relative;
  padding-left: 28px;
  margin-bottom: 16px;
  font-size: 15px;
  color: #475569;
}
.tip-item::before {
  content: '💡';
  position: absolute;
  left: 0;
}
</style>
</head>
<body>

<header class="header">
  <div class="header-tag">🎓 终身学习者路线</div>
  <h1>AI 指挥官学习路线图</h1>
  <p class="sub">通过 AI 驱动的实战项目，掌握从想法到产品的全流程思维架构。</p>
  <div class="project-pill">📚 核心课题：构建智能内容生成系统</div>
  
  <div class="progress-section">
    <div class="progress-meta">
      <span id="prog-label">学习进度 0 / 16</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>
</header>

<nav class="tabs-container">
  <div class="tabs" id="tabs"></div>
</nav>

<main class="content" id="content"></main>

<script>
const phases = [
  {
    id: 1,
    title: "建立心智模型",
    eyebrow: "Phase 01 · 基础认知",
    desc: "在编写代码之前，先理解系统的运作逻辑。你的目标是成为能够指挥 AI 的“架构师”。",
    mindset: "🧠 核心教学法：所有软件本质上都是「数据流动」。你只需搞清楚：数据从哪来、如何处理、在哪展示。",
    steps: [
      {
        tag: "架构",

      {
        tag: "实战",
        title: "调用你的第一个 AI API",

        prompt: `编写一个简单的 Python 脚本：
- 调用 Anthropic API
- 发送消息："你好，请介绍你的核心优势"

        resources: [{ name: "Anthropic 文档", url: "https://docs.anthropic.com/" }]
      },
      {

        desc: "这是“指挥官”的核心能力。将模糊的需求拆解为 AI 能理解的精准步骤。",
        prompt: `我想开发一个基于 Flask 的聊天网页。

  {

    eyebrow: "Phase 02 · 动手实践",
    desc: "做出你的第一个 AI 产品原型。不追求完美，只追求“端到端”的闭环体验。",

- 接收 JSON 格式的消息

        resources: [{ name: "MDN Fetch", url: "https://developer.mozilla.org/zh-CN/docs/Web/API/Fetch_API" }]

      {
        tag: "迭代",

    eyebrow: "Phase 03 · 深度掌控",
    desc: "学会如何像专家一样处理问题。出错是最好的学习机会。",

let completed = {};
let expanded = {};
const totalSteps = phases.reduce((a, p) => a + p.steps.length, 0);

function updateProgress() {
  const count = Object.values(completed).filter(Boolean).length;
  const pct = Math.round((count / totalSteps) * 100);
  document.getElementById("prog-label").textContent = `学习进度 ${count} / ${totalSteps}`;
  document.getElementById("prog-pct").textContent = `${pct}%`;
  document.getElementById("prog-fill").style.width = pct + "%";
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = phases.map(p => `
    <button class="tab-btn ${p.id === activePhase ? 'active' : ''}" onclick="switchPhase(${p.id})">
      阶段 ${p.id}
    </button>
  `).join("");
}

function renderContent() {
  const phase = phases.find(p => p.id === activePhase);
  document.getElementById("content").innerHTML = `
    <div class="phase-intro">
      <div class="phase-eyebrow">${phase.eyebrow}</div>
      <h2 class="phase-title">${phase.title}</h2>
      <p class="phase-desc">${phase.desc}</p>
    </div>

    <div class="mindset-card">
      <div class="mindset-icon">💡</div>
      <div class="mindset-text">${phase.mindset}</div>
    </div>

    <div class="steps">
      ${phase.steps.map((step, i) => {
        const key = `${phase.id}-${i}`;
        const isDone = !!completed[key];
        const isOpen = !!expanded[key];
        return `
          <div class="step-card ${isDone ? 'done' : ''}" id="card-${key}">
            <div class="step-header" onclick="toggleExpand('${key}')">
              <div class="step-number">${isDone ? '✓' : i + 1}</div>
              <div class="step-info">
                <div class="step-tag">${step.tag}</div>
                <div class="step-title">${step.title}</div>
              </div>
              <button class="btn" style="padding: 6px 12px; font-size: 12px;" onclick="event.stopPropagation(); toggleDone('${key}')">
                ${isDone ? '已掌握' : '标记完成'}
              </button>
            </div>
            <div class="step-body ${isOpen ? 'open' : ''}" id="body-${key}">
              <p class="step-desc">${step.desc}</p>
              <div class="assignment">
                <div class="assignment-label">📝 课后作业 / 实践指令</div>
                <div class="assignment-text">${step.prompt}</div>
              </div>
              <div class="resources">
                ${step.resources.map(r => `<a class="resource-link" href="${r.url}" target="_blank">📖 ${r.name}</a>`).join('')}
              </div>
            </div>
          </div>`;
      }).join('')}
    </div>

    <div class="nav-buttons">
      <button class="btn" onclick="switchPhase(${activePhase - 1})" ${activePhase === 1 ? 'disabled' : ''}>← 上一阶段</button>
      <button class="btn primary" onclick="switchPhase(${activePhase + 1})" ${activePhase === 4 ? 'disabled' : ''}>
        ${activePhase === 4 ? '全部完成！' : '进入下一阶段 →'}
      </button>
    </div>

    <div class="teacher-tips">
      <h3 class="tips-title">👨‍🏫 导师寄语</h3>
      <ul class="tip-list">
        ${teacherTips.map(t => `<li class="tip-item">${t}</li>`).join('')}
      </ul>
    </div>
  `;
}

function switchPhase(id) {
  if (id < 1 || id > 4) return;
  activePhase = id;
  renderTabs();
  renderContent();
  window.scrollTo({ top: 350, behavior: 'smooth' });
}

function toggleExpand(key) {
  expanded[key] = !expanded[key];
  renderContent();
}

function toggleDone(key) {
  completed[key] = !completed[key];
  updateProgress();
  renderContent();
}

renderTabs();
renderContent();
updateProgress();
</script>
</body>
</html>
